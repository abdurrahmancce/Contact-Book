<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Book</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<style>
/* Reset & Base */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0d0f14;
  --surface:   #13161e;
  --surface2:  #1a1e29;
  --surface3:  #21263a;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.13);
  --accent:    #6979f8;
  --accent2:   #a78bfa;
  --green:     #34d399;
  --red:       #f87171;
  --amber:     #fbbf24;
  --text:      #e8eaf2;
  --text2:     #8b90a8;
  --text3:     #50566e;
  --sidebar-w: 300px;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --radius:    10px;
  --radius-lg: 16px;
}
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; }
input, button, textarea { font-family: var(--font-body); }
button { cursor: pointer; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

/* Layout */
.shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: 58px 1fr;
  height: 100vh;
}

/* Header */
.header {
  grid-column: 1 / -1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 22px;
  gap: 14px;
  position: relative;
  z-index: 10;
}
.header-logo {
  width: 32px; height: 32px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.header-logo svg { width: 16px; height: 16px; fill: white; }
.header-title {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text);
}
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.pill {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
}
.pill span { color: var(--accent); font-weight: 700; }

/* Sidebar */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.search-box {
  padding: 14px 14px 10px;
}
.search-inner {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0 12px;
  transition: border-color 0.15s;
}
.search-inner:focus-within { border-color: var(--accent); }
.search-inner svg { width: 14px; height: 14px; fill: var(--text3); flex-shrink: 0; }
.search-inner input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 13px; padding: 9px 0;
}
.search-inner input::placeholder { color: var(--text3); }

.list-header {
  padding: 4px 16px 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
}
.contact-list { flex: 1; overflow-y: auto; }
.contact-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 0;
  transition: background 0.12s;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.contact-item:hover { background: var(--surface2); }
.contact-item.active { background: var(--surface3); }
.contact-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 3px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}
.avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head);
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.av-blue   { background: rgba(105,121,248,0.18); color: #a5b4ff; }
.av-green  { background: rgba(52,211,153,0.15);  color: #6ee7b7; }
.av-amber  { background: rgba(251,191,36,0.15);  color: #fde68a; }
.av-rose   { background: rgba(248,113,113,0.15); color: #fca5a5; }
.av-purple { background: rgba(167,139,250,0.15); color: var(--accent2); }
.ci-name  { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
.ci-phone { font-size: 11px; color: var(--text3); margin-top: 1px; }
.list-empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
  line-height: 1.8;
}
.list-empty svg { width: 36px; height: 36px; fill: var(--text3); margin: 0 auto 12px; display: block; opacity: 0.5; }

.sidebar-actions {
  padding: 12px 12px 14px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 7px;
  border-top: 1px solid var(--border);
}
.act-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 9px 4px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-size: 11px;
  font-weight: 500;
  transition: all 0.15s;
}
.act-btn svg { width: 16px; height: 16px; fill: currentColor; }
.act-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface3); }
.act-btn.add:hover  { border-color: rgba(105,121,248,0.5); color: var(--accent); background: rgba(105,121,248,0.08); }
.act-btn.edit:hover { border-color: rgba(52,211,153,0.4);  color: var(--green); background: rgba(52,211,153,0.07); }
.act-btn.del:hover  { border-color: rgba(248,113,113,0.4); color: var(--red);   background: rgba(248,113,113,0.07); }

/* Main Panel */
.main {
  overflow-y: auto;
  background: var(--bg);
  display: flex;
  flex-direction: column;
}

/* Welcome screen */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: var(--text3);
  padding: 40px;
}
.welcome-icon {
  width: 72px; height: 72px;
  border-radius: 22px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 4px;
}
.welcome-icon svg { width: 32px; height: 32px; fill: var(--text3); opacity: 0.6; }
.welcome h2 { font-family: var(--font-head); font-size: 18px; font-weight: 700; color: var(--text2); }
.welcome p  { font-size: 13px; color: var(--text3); text-align: center; line-height: 1.7; max-width: 260px; }
.welcome-add {
  margin-top: 6px;
  padding: 9px 20px;
  border-radius: var(--radius);
  background: var(--accent);
  color: white;
  border: none;
  font-size: 13px;
  font-weight: 600;
  display: flex; align-items: center; gap: 7px;
  transition: opacity 0.15s;
}
.welcome-add:hover { opacity: 0.88; }
.welcome-add svg { width: 14px; height: 14px; fill: white; }

/* Detail view */
.detail-page { padding: 28px 32px; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.detail-top {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 28px;
  padding-bottom: 22px;
  border-bottom: 1px solid var(--border);
}
.avatar-xl {
  width: 64px; height: 64px;
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 800;
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.detail-name  { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: var(--text); }
.detail-label { font-size: 12px; color: var(--text3); margin-top: 3px; }

.fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.field-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  transition: border-color 0.15s;
}
.field-card:hover { border-color: var(--border2); }
.field-card.full { grid-column: 1 / -1; }
.field-card-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
}
.field-card-icon svg { width: 14px; height: 14px; fill: currentColor; }
.icon-blue   { background: rgba(105,121,248,0.15); color: var(--accent); }
.icon-green  { background: rgba(52,211,153,0.12);  color: var(--green); }
.icon-amber  { background: rgba(251,191,36,0.12);  color: var(--amber); }
.field-card-label { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
.field-card-value { font-size: 14px; color: var(--text); font-weight: 400; word-break: break-all; line-height: 1.5; }
.field-card-value.empty { color: var(--text3); font-style: italic; }

.detail-actions { display: flex; gap: 10px; }
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  border: none;
  transition: all 0.15s;
}
.btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }
.btn-primary  { background: var(--accent); color: white; }
.btn-primary:hover { background: #7b8af9; }
.btn-ghost {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
}
.btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
.btn-danger-ghost {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--red);
}
.btn-danger-ghost:hover { border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.07); }

/* Form view */
.form-page { padding: 28px 32px; animation: fadeIn 0.2s ease; max-width: 620px; }
.form-heading {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 4px;
  color: var(--text);
  display: flex; align-items: center; gap: 10px;
}
.form-heading svg { width: 20px; height: 20px; fill: var(--accent); }
.form-subheading { font-size: 13px; color: var(--text3); margin-bottom: 24px; }
.form-section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin: 20px 0 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.02em; }
.form-group label .req { color: var(--accent); margin-left: 2px; }
.form-group input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  width: 100%;
}
.form-group input::placeholder { color: var(--text3); }
.form-group input:focus { border-color: var(--accent); background: var(--surface2); }
.form-group input.has-error { border-color: var(--red); }
.form-group input.has-error:focus { border-color: var(--red); }
.field-error { font-size: 11px; color: var(--red); display: flex; align-items: center; gap: 4px; }
.field-error svg { width: 11px; height: 11px; fill: var(--red); flex-shrink: 0; }
.form-actions {
  display: flex; gap: 10px;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  backdrop-filter: blur(2px);
  animation: fadeIn 0.15s ease;
}
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 28px;
  width: 360px;
  text-align: center;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  animation: scaleIn 0.15s ease;
}
@keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-icon {
  width: 52px; height: 52px;
  background: rgba(248,113,113,0.12);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
}
.modal-icon svg { width: 24px; height: 24px; fill: var(--red); }
.modal-title { font-family: var(--font-head); font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.modal-msg { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 22px; }
.modal-msg strong { color: var(--text); font-weight: 600; }
.modal-btns { display: flex; gap: 10px; justify-content: center; }
.btn-danger { background: var(--red); color: white; padding: 9px 22px; border-radius: var(--radius); font-size: 13px; font-weight: 600; border: none; transition: opacity 0.15s; }
.btn-danger:hover { opacity: 0.85; }

/* Toast */
.toast-container { position: fixed; bottom: 22px; right: 22px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid;
  animation: slideIn 0.25s ease;
  min-width: 220px;
  max-width: 320px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }
.toast-item svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }
.toast-success { background: rgba(52,211,153,0.12); color: var(--green); border-color: rgba(52,211,153,0.25); }
.toast-error   { background: rgba(248,113,113,0.12); color: var(--red);   border-color: rgba(248,113,113,0.25); }
.toast-info    { background: rgba(105,121,248,0.12); color: var(--accent); border-color: rgba(105,121,248,0.25); }

/* Responsive tweaks */
@media (max-width: 640px) {
  :root { --sidebar-w: 220px; }
  .form-row { grid-template-columns: 1fr; }
  .fields-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="shell">
  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm6 12H6v-.9c0-1.98 3.33-3 6-3s6 1.02 6 3v.9z"/></svg>
    </div>
    <span class="header-title">Contact Book</span>
    <div class="header-right">
      <div class="pill" id="count-pill"><span id="count-num">0</span> contacts</div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="search-box">
      <div class="search-inner">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="search-input" placeholder="Search name, phone, email…" oninput="filterList()" autocomplete="off" />
      </div>
    </div>
    <div class="list-header">All Contacts</div>
    <div class="contact-list" id="contact-list"></div>
    <div class="sidebar-actions">
      <button class="act-btn add" onclick="showAddForm()" title="Add new contact">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Add
      </button>
      <button class="act-btn edit" onclick="showEditForm()" title="Edit selected">
        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.2a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        Edit
      </button>
      <button class="act-btn del" onclick="confirmDelete()" title="Delete selected">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        Delete
      </button>
    </div>
  </aside>

  <!-- Main panel -->
  <main class="main" id="main-panel"></main>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script>
/* Data & State */
const STORAGE_KEY = 'contactbook_v2';

let contacts = [];
let selectedName = null;
let editOriginal = null;

const AVATAR_COLORS = ['av-blue','av-green','av-amber','av-rose','av-purple'];
const AVATAR_XL_STYLES = [
  {background:'rgba(105,121,248,0.18)',color:'#a5b4ff'},
  {background:'rgba(52,211,153,0.15)', color:'#6ee7b7'},
  {background:'rgba(251,191,36,0.15)', color:'#fde68a'},
  {background:'rgba(248,113,113,0.15)',color:'#fca5a5'},
  {background:'rgba(167,139,250,0.15)',color:'#c4b5fd'},
];

function avatarIdx(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
  return h % AVATAR_COLORS.length;
}
function initials(name) {
  return name.trim().split(/\s+/).slice(0,2).map(w => w[0] || '').join('').toUpperCase();
}
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* Persistence */
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { contacts = JSON.parse(raw); return; }
  } catch(e) {}
  // Default sample contacts
  contacts = [
    { name:'Alice Rahman',    phone:'+880 1711-000001', email:'alice@example.com',  address:'12 Gulshan Avenue, Dhaka'   },
    { name:'Bob Hossain',     phone:'+880 1811-000002', email:'bob@example.com',    address:'45 Agrabad, Chittagong'     },
    { name:'Carol Chowdhury', phone:'+880 1911-000003', email:'carol@example.com',  address:'78 Banani Road, Dhaka'      },
    { name:'David Khan',      phone:'+880 1611-000004', email:'david@example.com',  address:'21 Dhanmondi, Dhaka'        },
    { name:'Eva Begum',       phone:'+880 1511-000005', email:'eva@example.com',    address:'5 Sylhet Road, Sylhet'      },
  ];
  saveData();
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(contacts)); } catch(e) {}
}

/* Validation */
function isValidPhone(p) {
  const d = p.replace(/[\s\-\(\)\+]/g,'');
  return /^\d{7,15}$/.test(d);
}
function isValidEmail(e) {
  return /^[\w\.\+\-]+@[\w\-]+\.[a-zA-Z]{2,}$/.test(e);
}
function isDupPhone(phone, excludeName='') {
  const n = phone.replace(/[\s\-\(\)\+]/g,'');
  return contacts.some(c => {
    if (c.name.toLowerCase() === excludeName.toLowerCase()) return false;
    return c.phone.replace(/[\s\-\(\)\+]/g,'') === n;
  });
}

/* Sidebar List */
function filterList() {
  const kw = document.getElementById('search-input').value.toLowerCase();
  const visible = kw
    ? contacts.filter(c =>
        c.name.toLowerCase().includes(kw) ||
        c.phone.includes(kw) ||
        (c.email||'').toLowerCase().includes(kw)
      )
    : [...contacts];
  renderList(visible);
}

function renderList(list) {
  const el = document.getElementById('contact-list');
  const sorted = [...list].sort((a,b) => a.name.localeCompare(b.name));

  if (!sorted.length) {
    el.innerHTML = `<div class="list-empty">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      No contacts found
    </div>`;
  } else {
    el.innerHTML = sorted.map(c => {
      const idx = avatarIdx(c.name);
      return `<div class="contact-item${c.name===selectedName?' active':''}"
                   onclick="selectContact('${esc(c.name)}')">
        <div class="avatar ${AVATAR_COLORS[idx]}">${esc(initials(c.name))}</div>
        <div>
          <div class="ci-name">${esc(c.name)}</div>
          <div class="ci-phone">${esc(c.phone)}</div>
        </div>
      </div>`;
    }).join('');
  }

  // Update count badge
  const n = contacts.length;
  document.getElementById('count-num').textContent = n;
  document.getElementById('count-pill').innerHTML = `<span id="count-num">${n}</span> contact${n!==1?'s':''}`;
}

function selectContact(name) {
  selectedName = name;
  filterList();
  const c = contacts.find(x => x.name === name);
  if (c) showDetail(c);
}

/* Detail View */
function showDetail(c) {
  const idx = avatarIdx(c.name);
  const xlStyle = AVATAR_XL_STYLES[idx];
  document.getElementById('main-panel').innerHTML = `
    <div class="detail-page">
      <div class="detail-top">
        <div class="avatar-xl" style="background:${xlStyle.background};color:${xlStyle.color}">${esc(initials(c.name))}</div>
        <div>
          <div class="detail-name">${esc(c.name)}</div>
          <div class="detail-label">Personal contact</div>
        </div>
      </div>

      <div class="fields-grid">
        <div class="field-card">
          <div class="field-card-icon icon-blue">
            <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
          </div>
          <div class="field-card-label">Phone</div>
          <div class="field-card-value">${esc(c.phone)}</div>
        </div>
        <div class="field-card">
          <div class="field-card-icon icon-green">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
          </div>
          <div class="field-card-label">Email</div>
          <div class="field-card-value ${c.email?'':'empty'}">${c.email ? esc(c.email) : 'Not provided'}</div>
        </div>
        <div class="field-card full">
          <div class="field-card-icon icon-amber">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          </div>
          <div class="field-card-label">Address</div>
          <div class="field-card-value ${c.address?'':'empty'}">${c.address ? esc(c.address) : 'Not provided'}</div>
        </div>
      </div>

      <div class="detail-actions">
        <button class="btn btn-ghost" onclick="showEditForm()">
          <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.2a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          Edit Contact
        </button>
        <button class="btn btn-danger-ghost" onclick="confirmDelete()">
          <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          Delete
        </button>
      </div>
    </div>`;
}

/* Welcome Screen */
function showWelcome() {
  document.getElementById('main-panel').innerHTML = `
    <div class="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm6 12H6v-.9c0-1.98 3.33-3 6-3s6 1.02 6 3v.9z"/></svg>
      </div>
      <h2>Your Contacts</h2>
      <p>Select a contact from the sidebar to view their details, or add a new one.</p>
      <button class="welcome-add" onclick="showAddForm()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Add New Contact
      </button>
    </div>`;
}

/* Forms */
function showAddForm() {
  editOriginal = null;
  renderForm('Add new contact', '', '', '', '');
}

function showEditForm() {
  if (!selectedName) { showToast('Select a contact to edit.', 'error'); return; }
  const c = contacts.find(x => x.name === selectedName);
  if (!c) return;
  editOriginal = c.name;
  renderForm('Edit contact', c.name, c.phone, c.email||'', c.address||'');
}

function renderForm(title, name, phone, email, address) {
  const isEdit = !!editOriginal;
  document.getElementById('main-panel').innerHTML = `
    <div class="form-page">
      <div class="form-heading">
        <svg viewBox="0 0 24 24">
          ${isEdit
            ? '<path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.2a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>'
            : '<path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>'}
        </svg>
        ${esc(title)}
      </div>
      <div class="form-subheading">${isEdit ? 'Update the details below.' : 'Fill in the details to save a new contact.'}</div>

      <div class="form-section-title">Basic Information</div>
      <div class="form-group full">
        <label for="f-name">Full name <span class="req">*</span></label>
        <input id="f-name" type="text" value="${esc(name)}" placeholder="e.g. Alice Rahman" autocomplete="off" />
        <span class="field-error" id="err-name" style="display:none">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>
          <span></span>
        </span>
      </div>

      <div class="form-section-title">Contact Details</div>
      <div class="form-row">
        <div class="form-group">
          <label for="f-phone">Phone number <span class="req">*</span></label>
          <input id="f-phone" type="text" value="${esc(phone)}" placeholder="+880 1711-000000" autocomplete="off" />
          <span class="field-error" id="err-phone" style="display:none">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>
            <span></span>
          </span>
        </div>
        <div class="form-group">
          <label for="f-email">Email address</label>
          <input id="f-email" type="text" value="${esc(email)}" placeholder="user@example.com" autocomplete="off" />
          <span class="field-error" id="err-email" style="display:none">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>
            <span></span>
          </span>
        </div>
      </div>

      <div class="form-section-title">Location</div>
      <div class="form-group">
        <label for="f-addr">Address</label>
        <input id="f-addr" type="text" value="${esc(address)}" placeholder="Street, City, Country" autocomplete="off" />
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitForm()">
          <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm2 16H5V5h11.17L19 7.83V19zm-7-7c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zM6 6h9v4H6z"/></svg>
          Save Contact
        </button>
        <button class="btn btn-ghost" onclick="cancelForm()">Cancel</button>
      </div>
    </div>`;

  document.getElementById('f-name').focus();
  // Allow Enter to submit
  ['f-name','f-phone','f-email','f-addr'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if (e.key==='Enter') submitForm(); });
  });
}

function clearErrors() {
  ['name','phone','email'].forEach(k => {
    const err = document.getElementById('err-'+k);
    const inp = document.getElementById('f-'+k);
    if (err) err.style.display = 'none';
    if (inp) inp.classList.remove('has-error');
  });
}

function showFieldError(field, msg) {
  const err = document.getElementById('err-'+field);
  const inp = document.getElementById('f-'+field);
  if (err) { err.style.display='flex'; err.querySelector('span').textContent=msg; }
  if (inp) inp.classList.add('has-error');
}

function submitForm() {
  clearErrors();
  const name    = (document.getElementById('f-name')?.value  || '').trim();
  const phone   = (document.getElementById('f-phone')?.value || '').trim();
  const email   = (document.getElementById('f-email')?.value || '').trim();
  const address = (document.getElementById('f-addr')?.value  || '').trim();

  let ok = true;
  if (!name)                          { showFieldError('name',  'Full name is required.');          ok=false; }
  if (!isValidPhone(phone))           { showFieldError('phone', 'Enter a valid phone (7–15 digits).'); ok=false; }
  else if (isDupPhone(phone, editOriginal||'')) { showFieldError('phone','This phone number already exists.'); ok=false; }
  if (email && !isValidEmail(email))  { showFieldError('email', 'Enter a valid email address.');    ok=false; }
  if (!ok) return;

  const finalName = name.replace(/\b\w/g, l => l.toUpperCase());
  const newContact = { name: finalName, phone, email, address };

  if (editOriginal) {
    const idx = contacts.findIndex(c => c.name === editOriginal);
    if (idx >= 0) contacts[idx] = newContact;
    showToast('Contact updated successfully!', 'success');
  } else {
    contacts.push(newContact);
    showToast('Contact added successfully!', 'success');
  }

  saveData();
  selectedName = finalName;
  filterList();
  showDetail(newContact);
}

function cancelForm() {
  if (selectedName) {
    const c = contacts.find(x => x.name === selectedName);
    if (c) { showDetail(c); return; }
  }
  showWelcome();
}

/* Delete */
function confirmDelete() {
  if (!selectedName) { showToast('Select a contact to delete.', 'error'); return; }
  const c = contacts.find(x => x.name === selectedName);
  if (!c) return;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </div>
      <div class="modal-title">Delete Contact</div>
      <div class="modal-msg">
        Are you sure you want to delete <strong>${esc(c.name)}</strong>?<br>This action cannot be undone.
      </div>
      <div class="modal-btns">
        <button class="btn-danger" id="modal-confirm">Delete</button>
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById('modal-confirm').onclick = () => {
    contacts = contacts.filter(x => x.name !== c.name);
    saveData();
    selectedName = null;
    filterList();
    showWelcome();
    overlay.remove();
    showToast(`"${c.name}" deleted.`, 'success');
  };
  document.getElementById('modal-cancel').onclick = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target===overlay) overlay.remove(); });
}

/* Toast */
const TOAST_ICONS = {
  success: '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>',
  error:   '<path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/>',
  info:    '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>',
};

function showToast(msg, type='info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.innerHTML = `<svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:currentColor;flex-shrink:0">${TOAST_ICONS[type]||TOAST_ICONS.info}</svg>${esc(msg)}`;
  container.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.3s, transform 0.3s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(16px)';
    setTimeout(() => el.remove(), 350);
  }, 3000);
}

/* Boot */
loadData();
filterList();
showWelcome();
</script>
</body>
</html>
